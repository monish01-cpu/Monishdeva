<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Personal Expense Tracker</h1>

        <!-- Add/Edit Record Form -->
        <form id="recordForm">
            <input type="text" id="name" placeholder="Name" required>
            <select id="type" required>
                <option value="">Select Type</option>
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
            </select>
            <input type="text" id="category" placeholder="Category" required>
            <input type="number" id="amount" placeholder="Amount" required>
            <input type="date" id="date" required>
            <button type="submit">Add / Update Record</button>
        </form>

        <!-- Balance -->
        <div id="balanceContainer">
            <h2>Current Balance: <span id="balance">0</span></h2>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="filterCategory" placeholder="Filter by Category">
            <input type="date" id="filterDate" placeholder="Filter by Date">
            <button onclick="applyFilters()">Apply Filters</button>
            <button onclick="clearFilters()">Clear Filters</button>
        </div>

        <!-- Category Chart -->
        <div id="chartContainer">
            <h3>Category-wise Expense Chart</h3>
            <canvas id="expenseChart"></canvas>
        </div>

        <!-- Records Table -->
        <table id="recordsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
